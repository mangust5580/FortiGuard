<div class="request-form__fields">
    <div class="request-form__short-grid request-form__field--full">
      <div class="field request-form__field--full">
        <span class="field__label visually-hidden" id="calculation-request-tariff-label">Интересующий тариф</span>
        <div class="request-form__field-control request-form__field-control--select">
          <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-demo-field-scenario"></use>
          </svg>
          <div class="select request-form__select" data-js-select data-js-select-required>
            <input type="hidden" name="tariff" value="" data-js-select-input>
            <button
              class="select__trigger request-form__select-trigger"
              type="button"
              data-js-select-trigger
              aria-expanded="false"
              aria-haspopup="listbox"
              aria-labelledby="calculation-request-tariff-label calculation-request-tariff-value"
            >
              <span class="select__value" data-js-select-value id="calculation-request-tariff-value">Интересующий тариф</span>
              <span class="select__icon" aria-hidden="true"></span>
            </button>
            <div class="select__dropdown request-form__select-dropdown" role="listbox" aria-labelledby="calculation-request-tariff-label" data-js-select-dropdown>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="Start">Start</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="Business">Business</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="Enterprise">Enterprise</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="Индивидуальный расчёт">Индивидуальный расчёт</button>
            </div>
          </div>
        </div>
      </div>

      <label class="field">
        <span class="field__label visually-hidden">Имя</span>
        <span class="request-form__field-control">
          <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-demo-field-user"></use>
          </svg>
          <input class="field__control request-form__control" type="text" name="name" autocomplete="name" placeholder="Имя" required>
        </span>
      </label>

      <label class="field">
        <span class="field__label visually-hidden">Email</span>
        <span class="request-form__field-control">
          <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-demo-field-email"></use>
          </svg>
          <input class="field__control request-form__control" type="email" name="email" autocomplete="email" placeholder="Email" required>
        </span>
      </label>

      <label class="field">
        <span class="field__label visually-hidden">Телефон</span>
        <span class="request-form__field-control">
          <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-demo-field-phone"></use>
          </svg>
          <input class="field__control request-form__control" type="tel" name="phone" autocomplete="tel" inputmode="tel" placeholder="+7 (___) ___-__-__" data-js-input-mask="phone">
        </span>
      </label>

      <label class="field">
        <span class="field__label visually-hidden">Компания</span>
        <span class="request-form__field-control">
          <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-demo-field-company"></use>
          </svg>
          <input class="field__control request-form__control" type="text" name="company" autocomplete="organization" placeholder="Компания" required>
        </span>
      </label>

      <div class="field request-form__field--full">
        <span class="field__label visually-hidden" id="calculation-request-employees-label">Количество сотрудников</span>
        <div class="request-form__field-control request-form__field-control--select">
          <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-demo-field-employees"></use>
          </svg>
          <div class="select request-form__select" data-js-select data-js-select-required>
            <input type="hidden" name="employees" value="" data-js-select-input>
            <button
              class="select__trigger request-form__select-trigger"
              type="button"
              data-js-select-trigger
              aria-expanded="false"
              aria-haspopup="listbox"
              aria-labelledby="calculation-request-employees-label calculation-request-employees-value"
            >
              <span class="select__value" data-js-select-value id="calculation-request-employees-value">Количество сотрудников</span>
              <span class="select__icon" aria-hidden="true"></span>
            </button>
            <div class="select__dropdown request-form__select-dropdown" role="listbox" aria-labelledby="calculation-request-employees-label" data-js-select-dropdown>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="1-50">1–50</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="51-200">51–200</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="201-500">201–500</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="501-1000">501–1000</button>
              <button class="select__option" type="button" role="option" aria-selected="false" data-js-select-option data-value="1000+">1000+</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <label class="field request-form__field--full request-form__field--comment" data-js-char-counter>
      <span class="field__label">Расскажите о ваших задачах</span>
      <span class="request-form__field-control request-form__field-control--textarea">
        <svg class="request-form__input-icon icon" aria-hidden="true" focusable="false">
          <use href="icons/sprite.svg#icon-demo-field-comment"></use>
        </svg>
        <textarea
          id="calculation-request-comment"
          class="field__control field__control--textarea request-form__control request-form__control--textarea"
          data-js-char-counter-input
          name="comment"
          aria-describedby="calculation-request-comment-counter"
          maxlength="500"
          placeholder="Опишите ваши задачи или вопросы — мы подготовим расчёт под инфраструктуру."
        ></textarea>
      </span>
      <output class="request-form__counter" id="calculation-request-comment-counter" data-js-char-counter-output for="calculation-request-comment">0/500</output>
    </label>

</div>
