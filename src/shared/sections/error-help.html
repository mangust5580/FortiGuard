<section class="error-help" aria-labelledby="error-help-title">
  <div class="container">
    <div class="error-help__card card card--feature">
      <div class="error-help__illustration" aria-hidden="true">
        <picture class="error-help__picture">
          <source
            srcset="images/contacts/contacts-support.avif 1x, images/contacts/contacts-support@2x.avif 2x"
            type="image/avif"
          >
          <source
            srcset="images/contacts/contacts-support.webp 1x, images/contacts/contacts-support@2x.webp 2x"
            type="image/webp"
          >
          <source
            srcset="images/contacts/contacts-support.png 1x, images/contacts/contacts-support@2x.png 2x"
            type="image/png"
          >
          <img
            class="error-help__image"
            src="images/contacts/contacts-support.png"
            alt=""
            width="627"
            height="627"
            loading="lazy"
            decoding="async"
          >
        </picture>
      </div>

      <div class="error-help__content">
        <h2 class="error-help__title card__title" id="error-help-title">Нужна помощь?</h2>
        <p class="error-help__text card__text">
          Если вы не нашли нужную информацию, наша команда готова помочь.
        </p>
      </div>

      <div class="error-help__actions">
        <a class="button button--primary" href="#demo" data-js-modal-open="demo">
          <span class="button__text">Запросить демо</span>
        </a>
        <a class="button button--secondary" href="index.html#contacts">
          <span class="button__text">Связаться с нами</span>
        </a>
      </div>
    </div>
  </div>
</section>
